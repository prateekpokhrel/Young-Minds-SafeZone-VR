<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeZone VR</title>
  <!-- A-Frame Library -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0e15;
      font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: radial-gradient(circle at center, #1b2838 0%, #000000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      margin: 0;
      background: linear-gradient(90deg, #00C9FF, #92FE9D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #prompt {
      color: #a0a5d4;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 15px;
      width: 220px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255, 255, 255, 0.1);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 1.3rem;
    }

    .card p {
      font-size: 0.85rem;
      color: #ccc;
    }

    .card.elec {
      border-top: 4px solid #f39c12;
    }

    .card.fire {
      border-top: 4px solid #e74c3c;
    }

    .card.mech {
      border-top: 4px solid #3498db;
    }

    #vr-hud {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      border-radius: 10px;
      display: none;
      border: 1px solid #3498db;
      text-align: center;
      min-width: 400px;
      pointer-events: auto;
      /* ensure we can click the button */
    }

    #hud-msg {
      color: #fff;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 0;
    }

    .prog {
      color: #aaa;
      text-align: left;
      list-style: none;
      padding: 0;
      margin: 10px 0;
      font-size: 1rem;
    }

    .prog li::before {
      content: '⏳ ';
    }

    .prog li.done {
      color: #2ecc71;
    }

    .prog li.done::before {
      content: '✅ ';
    }

    button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    #alert {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      display: none;
    }

    /* Essential for mouse clicking on a-frame objects */
    .clickable {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="alert">ERROR</div>

  <div id="ui-overlay">
    <h1>SAFEZONE VR</h1>
    <p id="prompt">Select a High-Risk Task to Practice</p>
    <div class="cards">
      <div class="card elec" onclick="runSim('elec')">
        <h2 style="color:#f39c12;">Electrical</h2>
        <p>Learn to isolate power and repair live circuits safely.</p>
      </div>
      <div class="card fire" onclick="runSim('fire')">
        <h2 style="color:#e74c3c;">Fire Control</h2>
        <p>Douse dangerous chemical fires using the P.A.S.S method.</p>
      </div>
      <div class="card mech" onclick="runSim('mech')">
        <h2 style="color:#3498db;">Lockout/Tagout</h2>
        <p>Halt machinery and apply LOTO protocols safely.</p>
      </div>
    </div>
  </div>

  <div id="vr-hud">
    <p id="hud-msg"></p>
    <ul class="prog" id="prog-list"></ul>
    <button onclick="exitSim()">EXIT SIMULATION</button>
  </div>

  <a-scene id="virt-scene" style="display: none;" cursor="rayOrigin: mouse;" raycaster="objects: .clickable">
    <a-entity camera look-controls position="0 1.6 0">
      <!-- Raycaster directly on camera allows picking objects by looking/clicking mouse -->
      <a-text id="ttip" value="" position="0 -0.1 -1" align="center" width="1.5" color="yellow"></a-text>
    </a-entity>
    <a-entity id="world-content"></a-entity>
  </a-scene>

  <script>
    const ui = document.getElementById('ui-overlay');
    const vScene = document.getElementById('virt-scene');
    const hud = document.getElementById('vr-hud');
    const world = document.getElementById('world-content');
    const hudMsg = document.getElementById('hud-msg');
    const tasks = document.getElementById('prog-list');
    const alertBox = document.getElementById('alert');
    const ttip = document.getElementById('ttip');

    window.S = {}; // State

    function setObjAttr(id, attr, val) { document.getElementById(id).setAttribute(attr, val); }
    function showMsg(m, c = 'white') { hudMsg.innerText = m; hudMsg.style.color = c; }
    function fail(m) { alertBox.innerText = "FAILED: " + m; alertBox.style.display = 'block'; setTimeout(exitSim, 3000); }

    // Setup tasks
    function initTasks(list) {
      tasks.innerHTML = '';
      list.forEach((t, i) => { tasks.innerHTML += `<li id="t${i}">${t}</li>`; });
    }
    function doneT(i) { document.getElementById('t' + i).className = 'done'; }

    // Hover events globally defined
    window.hIn = (txt) => { ttip.setAttribute('value', txt); };
    window.hOut = () => { ttip.setAttribute('value', ''); };
    const evts = (txt, cls, fn) => `class="clickable ${cls}" onmouseenter="hIn('${txt}')" onmouseleave="hOut()" onclick="${fn}"`;

    function runSim(type) {
      ui.style.display = 'none';
      vScene.style.display = 'block';
      hud.style.display = 'block';
      alertBox.style.display = 'none';
      world.innerHTML = '';

      if (type === 'mech') {
        showMsg('DANGER: Machine Malfunction. Perform Lockout/Tagout.', '#3498db');
        initTasks(['Press Yellow Emergency Stop', 'Pull Wall Handle down to Isolate', 'Attach Red Padlock to box', 'Test Start Button to verify 0 energy']);
        S = { step: 0 };

        world.innerHTML += `<a-entity environment="preset: tron"></a-entity>`;

        // Machine
        world.innerHTML += `
                    <a-box position="-1 1 -3.5" width="2" height="1.5" depth="1" color="#555"></a-box>
                    <a-cylinder id="chuck" position="0.5 1.5 -3.5" radius="0.3" height="0.5" rotation="0 0 90" color="#aaa"
                         animation="property: rotation; to: 360 0 90; loop: true; dur: 200; easing: linear"></a-cylinder>
                         
                    <a-box position="-0.5 1.5 -2.9" width="0.6" height="0.4" depth="0.1" color="#222"></a-box>
                    
                    <a-cylinder ${evts('E-STOP', '', 'act(`m_estop`)')} id="btn-stop" position="-0.7 1.5 -2.85" radius="0.08" height="0.05" rotation="90 0 0" color="yellow"></a-cylinder>
                    <a-cylinder ${evts('START BUTTON', '', 'act(`m_start`)')} id="btn-start" position="-0.3 1.5 -2.85" radius="0.08" height="0.05" rotation="90 0 0" color="green"></a-cylinder>
                `;

        // Wall Box
        world.innerHTML += `
                    <a-box position="2 1.5 -2.5" rotation="0 -30 0" width="0.8" height="1" depth="0.2" color="#777">
                        <a-box ${evts('POWER LEVER', '', 'act(`m_lever`)')} id="lv" position="-0.5 0 0" width="0.1" height="0.4" depth="0.05" color="red"></a-box>
                        <a-circle position="-0.5 -0.3 0" radius="0.05" color="black"></a-circle> <!-- Hole -->
                        <a-box id="lock" position="-0.5 -0.4 0.05" width="0.12" height="0.15" depth="0.05" color="red" visible="false">
                             <a-torus position="0 0.1 0" radius="0.04" radius-tubular="0.01" color="silver"></a-torus>
                             <a-plane position="0 -0.05 0.03" width="0.1" height="0.05" color="white"><a-text value="LOTO" align="center" width="0.5" color="black"></a-text></a-plane>
                        </a-box>
                    </a-box>
                `;

        // Lock on table
        world.innerHTML += `
                    <a-box position="1 0.8 -1.5" width="1" height="0.1" depth="0.6" color="#444"></a-box>
                    <a-box ${evts('Grab Padlock', '', 'act(`m_lock`)')} id="inv-lock" position="1 0.9 -1.5" width="0.12" height="0.15" depth="0.05" color="red">
                         <a-torus position="0 0.1 0" radius="0.04" radius-tubular="0.01" color="silver"></a-torus>
                         <a-plane position="0 -0.05 0.03" width="0.1" height="0.05" color="white"><a-text value="LOTO" align="center" width="0.5" color="black"></a-text></a-plane>
                    </a-box>
                `;
      }

      if (type === 'elec') {
        showMsg('GOAL: Safety first. Check voltage, kill power, then repair.', '#f39c12');
        initTasks(['Equip Insulated Gloves', 'Test Panel (Reads 220V)', 'Flip Breaker to Isolate', 'Test Panel Again (Reads 0V)', 'Fix Component safely']);
        S = { gloved: false, tested: false, iso: false, safe: false };

        world.innerHTML += `<a-entity environment="preset: default"></a-entity>`;

        world.innerHTML += `
                    <a-box position="0 1.5 -3" width="1" height="1.2" depth="0.1" color="#333"></a-box>
                    
                    <a-box ${evts('Repair Target', '', 'act(`e_fix`)')} id="target" position="-0.2 1.5 -2.9" width="0.2" height="0.3" depth="0.1" color="#111"></a-box>
                    <a-sphere id="spark" position="-0.2 1.5 -2.85" radius="0.04" color="yellow" material="shader:flat" animation="property: scale; to: 1.5 1.5 1.5; loop:true; dir:alternate; dur: 80"></a-sphere>

                    <a-box ${evts('Main Breaker', '', 'act(`e_break`)')} id="breaker" position="0.3 1.5 -2.9" width="0.1" height="0.3" depth="0.1" color="red"></a-box>
                    
                    <!-- Tools -->
                    <a-box position="0 0.8 -2" width="1.5" height="0.1" depth="0.5" color="#554433"></a-box>
                    <a-box ${evts('Grab Gloves', '', 'act(`e_glv`)')} id="gv" position="-0.4 0.9 -2" width="0.2" height="0.05" depth="0.2" color="orange"></a-box>
                    <a-box ${evts('Use Multimeter', '', 'act(`e_multi`)')} id="mul" position="0.4 0.9 -2" width="0.1" height="0.05" depth="0.2" color="black">
                        <a-text id="multi-out" value="0V" position="0 0.03 0" rotation="-90 0 0" align="center" width="1" color="lime"></a-text>
                    </a-box>
                `;
      }

      if (type === 'fire') {
        showMsg('GOAL: Use P.A.S.S methodology to stop the fire!', '#e74c3c');
        initTasks(['Pull Extinguisher Pin', 'Aim at BASE of Fire', 'Squeeze handle to Extinguish']);
        S = { pin: false, aim: false, hp: 100 };

        world.innerHTML += `<a-entity environment="preset: volcano; dressingAmount:0"></a-entity>`;

        world.innerHTML += `
                    <a-cylinder position="0 0.5 -3" radius="0.5" height="1" color="#222"></a-cylinder>
                    <a-cone ${evts('Aim at Base', '', 'act(`f_base`)')} id="fire" position="0 1 -3" radius-bottom="0.6" height="1" color="#ff4500" material="transparent:true; opacity:0.8" animation="property: scale; to: 1.1 1.2 1.1; loop:true; dir:alternate; dur: 100"></a-cone>
                    
                    <a-cylinder position="1 1 -2" radius="0.15" height="0.6" color="red"></a-cylinder>
                    <a-torus ${evts('Pull Pin', '', 'act(`f_pin`)')} id="pin" position="1 1.3 -1.85" radius="0.03" radius-tubular="0.01" rotation="0 90 0" color="yellow"></a-torus>
                    <a-box ${evts('Squeeze Handle', '', 'act(`f_sqz`)')} id="hnd" position="0.9 1.35 -2" width="0.2" height="0.05" depth="0.05" color="black"></a-box>
                `;
      }
    }

    window.act = function (v) {
      hOut(); // clear tooltip on click
      if (v === 'm_estop') {
        if (S.step !== 0) return fail("Use E-Stop first!");
        setObjAttr('chuck', 'animation', ''); // stop
        setObjAttr('btn-stop', 'position', '-0.7 1.48 -2.85');
        doneT(0); S.step = 1; showMsg('Machine stopped. Now pull the wall breaker down.');
      }
      if (v === 'm_lever') {
        if (S.step !== 1) return fail("Halt machine at panel first.");
        setObjAttr('lv', 'position', '-0.5 -0.1 0');
        doneT(1); S.step = 2; showMsg('Power isolated. Grab your red padlock.');
      }
      if (v === 'm_lock') {
        if (S.step !== 2) return fail("Isolate power first.");
        setObjAttr('inv-lock', 'visible', 'false');
        setObjAttr('lock', 'visible', 'true');
        doneT(2); S.step = 3; showMsg('LOTO applied. Crucial step: Test Start button on panel to verify zero energy.');
      }
      if (v === 'm_start') {
        if (S.step < 3) return fail("CRITICAL: You started machine without finishing LOTO!");
        doneT(3); showMsg('SUCCESS: Machine verified dead. Safe to work.', 'lime');
      }

      if (v === 'e_glv') {
        S.gloved = true; setObjAttr('gv', 'visible', 'false');
        doneT(0); showMsg('Gloves on. Grab Multimeter to test target.');
      }
      if (v === 'e_multi') {
        if (!S.gloved) return fail("Never approach live circuits without gloves.");
        if (!S.iso) {
          setObjAttr('multi-out', 'value', '220V'); setObjAttr('multi-out', 'color', 'red');
          doneT(1); S.tested = true; showMsg('Live Voltage! Isolate the breaker.');
        } else {
          setObjAttr('multi-out', 'value', '0V'); setObjAttr('multi-out', 'color', 'lime');
          doneT(3); S.safe = true; showMsg('0V Verified. Safe to repair target.');
        }
      }
      if (v === 'e_break') {
        if (!S.tested) return fail("Test voltage before throwing switches.");
        S.iso = true; setObjAttr('breaker', 'position', '0.3 1.4 -2.9');
        doneT(2); showMsg('Power cut. Use Multimeter again to ensure 0V.');
      }
      if (v === 'e_fix') {
        if (!S.safe) return fail("SHOCK: You didn't verify 0V!");
        setObjAttr('spark', 'visible', 'false');
        setObjAttr('target', 'color', 'green');
        doneT(4); showMsg('SUCCESS: Repaired safely.', 'lime');
      }

      if (v === 'f_pin') {
        S.pin = true; setObjAttr('pin', 'visible', 'false');
        doneT(0); showMsg('Pin pulled. Aim at base of fire.');
      }
      if (v === 'f_base') {
        if (!S.pin) return fail("Pull pin first!");
        S.aim = true;
        doneT(1); showMsg('Aimed. Squeeze handle repeatedly.');
      }
      if (v === 'f_sqz') {
        if (!S.aim) return fail("Aim at base first!");
        S.hp -= 34;
        let f = document.getElementById('fire');
        f.setAttribute('scale', `${S.hp / 100} ${S.hp / 100} ${S.hp / 100}`);
        if (S.hp <= 0) {
          f.setAttribute('visible', 'false');
          doneT(2); showMsg('SUCCESS: Fire out!', 'lime');
        }
      }
    };

    function exitSim() {
      vScene.style.display = 'none';
      hud.style.display = 'none';
      alertBox.style.display = 'none';
      ui.style.display = 'flex';
    }
  </script>
</body>

</html>
